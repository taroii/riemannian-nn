# Tiny CPU smoke config: proves the train -> instrument -> analyze loop runs
# end to end on the laptop in well under a minute. NOT a real experiment.
name: smoke

grid:
  kappa_data:  [0.0, -1.0, -4.0]   # includes 0 for the Euclidean-recovery check
  kappa_model: [-1.0]
  depth:       [2, 3]              # N >= 2 (single matched-curvature layer is trivial)
  width:       [16]
  seed:        [0, 1]

fixed:
  d0: 6
  d_out: 1
  n_train: 256
  n_test: 1024
  radius: 1.0

train:
  epochs: 80
  lr: 0.01
  matched_train_loss: null
